<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeerostock Inventory Search</title>
  <style>
    :root {
      --bg: #f4f8ff;
      --card: #ffffff;
      --text: #13203a;
      --muted: #5b6780;
      --primary: #3b82f6;
      --accent: #f97316;
      --good: #10b981;
      --line: #d8e2ff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: linear-gradient(120deg, #e8f1ff, #f8edff 55%, #fff3e8);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .page {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(39, 52, 102, 0.12);
    }
    h1 {
      margin: 0 0 8px;
      color: #1b2a50;
    }
    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    input, select, button {
      padding: 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.14);
    }
    button {
      border: 0;
      cursor: pointer;
      color: #fff;
      font-weight: 600;
      background: linear-gradient(90deg, var(--primary), #6b5cff);
    }
    button:hover {
      filter: brightness(1.05);
    }
    .utility-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 14px;
    }
    .switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    .switch input {
      width: 16px;
      height: 16px;
      margin: 0;
    }
    .error {
      color: #c1121f;
      margin-top: 4px;
      font-weight: 600;
    }
    .muted {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 10px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #edf2ff;
      font-size: 14px;
    }
    th {
      background: #eef4ff;
      color: #253961;
      letter-spacing: 0.2px;
    }
    tbody tr:nth-child(odd) {
      background: #fcfdff;
    }
    tbody tr:hover {
      background: #f2f7ff;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      background: #ecebff;
      color: #4538c7;
    }
    .price {
      color: var(--accent);
      font-weight: 700;
    }
    .qty {
      color: var(--good);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Inventory Search</h1>
    <p class="subtitle">Find surplus stock quickly with filter combinations.</p>
    <div class="filters">
      <input id="q" type="text" placeholder="Search product name" />
      <select id="category">
        <option value="">All categories</option>
      </select>
      <input id="minPrice" type="number" min="0" step="0.01" placeholder="Min price" />
      <input id="maxPrice" type="number" min="0" step="0.01" placeholder="Max price" />
      <button id="searchBtn">Search</button>
    </div>
    <div class="utility-row">
      <label class="switch">
        <input id="autoClear" type="checkbox" checked />
        Auto-clear search text after search
      </label>
      <div id="status" class="muted"></div>
    </div>
    <div id="error" class="error"></div>

    <div class="table-wrap">
      <table id="resultsTable" hidden>
        <thead>
          <tr>
            <th>#</th>
            <th>Product</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Price</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <script src="/static/search.js"></script>
</body>
</html>
